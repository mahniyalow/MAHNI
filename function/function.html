    <script>
        function toggleAudio(audioId, circleId) {
            var audio = document.getElementById(audioId);
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }

        window.onload = function() {
            var colors = ['yellow', 'black', 'aqua', 'orange', 'red', 'indigo', 'white', 'green', 'blue', 'lightblue', 'lightyellow', 'brown', 'magenta', 'purple', 'lightpink', 'grey'];
            var positions = JSON.parse(localStorage.getItem('circlePositions2')) || [];
            if (positions.length === 0) {
                for (var i = 1; i <= 16; i++) {
                    var x, y, overlapping;
                    do {
                        x = Math.random() * 1800; // 0-1800 for wider spread
                        y = Math.random() * 1000; // 0-1000 for taller spread
                        overlapping = false;
                        for (var pos of positions) {
                            var dx = x - pos.x;
                            var dy = y - pos.y;
                            var distance = Math.sqrt(dx*dx + dy*dy);
                            if (distance < 70) { // increased min distance for more spread
                                overlapping = true;
                                break;
                            }
                        }
                    } while (overlapping);
                    positions.push({x: x, y: y});
                }
                localStorage.setItem('circlePositions', JSON.stringify(positions));
            }
            for (var i = 1; i <= 16; i++) {
                var circle = document.getElementById('circle' + i);
                circle.style.backgroundColor = colors[i-1];
                circle.style.position = 'absolute';
                circle.style.top = positions[i-1].y + 'px';
                circle.style.left = positions[i-1].x + 'px';
            }
        };
    </script>
